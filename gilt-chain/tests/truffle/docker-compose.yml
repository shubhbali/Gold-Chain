services:
  genesis:
    image: gilt-genesis
    env_file: .env
    environment:
      NUMS_OF_VALIDATOR: 1
    volumes:
      - ./storage:/root/storage
      - ./scripts:/root/scripts
      - ./config:/root/config
      - ./init-holders:/root/init-holders
    command: /root/scripts/bootstrap.sh
  
  gilt-rpc:
    image: gilt
    healthcheck:
      test: nc -z localhost 8545
      interval: 3s
      timeout: 5s
      retries: 15
    env_file: .env
    environment:
      NODE_ID: gilt-rpc
    volumes:
      - ./storage/gilt-rpc:/root/.ethereum
      - ./scripts:/scripts
      - ./config:/config
    entrypoint: [ "sh", "-c", "/scripts/gilt-rpc.sh" ]
    networks:
      default:
        ipv4_address: 99.1.0.3

  gilt-validator1:
    image: gilt
    env_file: .env
    environment:
      NODE_ID: gilt-validator1
      BOOTSTRAP_HOST: gilt-rpc
    volumes:
      - ./storage/gilt-validator1:/root/.ethereum
      - ./scripts:/scripts
    entrypoint: [ "sh", "-c", "/scripts/gilt-validator.sh" ]
    networks:
      default:
        ipv4_address: 99.1.0.2
  
  truffle-test:
    image: truffle-test
    command: /scripts/truffle-test.sh
    env_file: .env
    environment:
      RPC_HOST: gilt-rpc
      RPC_PORT: 8545
    volumes:
      - ./scripts:/scripts
    depends_on:
      gilt-rpc:
        condition: service_healthy

networks:
  default:
    ipam:
      driver: default
      config:
        - subnet: 99.1.0.0/16

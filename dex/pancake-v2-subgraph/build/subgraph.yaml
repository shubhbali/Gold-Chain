specVersion: 0.0.4
description: Gold Chain Pancake-style V2 subgraph for WGILT/GOLD route pricing and analytics.
repository: https://github.com/pancakeswap/pancakeswap-v2-subgraph
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Factory
    network: goldchain
    source:
      address: "0xd3493b77679ba8ea16c266043e88fc0d53df56cd"
      abi: Factory
      startBlock: 175
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: Factory\Factory.wasm
      entities:
        - Pair
        - Token
      abis:
        - name: Factory
          file: Factory\factory.json
        - name: ERC20
          file: Factory\ERC20.json
        - name: ERC20SymbolBytes
          file: Factory\ERC20SymbolBytes.json
        - name: ERC20NameBytes
          file: Factory\ERC20NameBytes.json
      eventHandlers:
        - event: PairCreated(indexed address,indexed address,address,uint256)
          handler: handleNewPair
templates:
  - kind: ethereum/contract
    name: Pair
    network: goldchain
    source:
      abi: Pair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: templates\Pair\Pair.wasm
      entities:
        - Pair
        - Token
      abis:
        - name: Pair
          file: Pair\pair.json
        - name: Factory
          file: Pair\factory.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,uint256,uint256,indexed address)
          handler: handleBurn
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Sync(uint112,uint112)
          handler: handleSync

[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
no-match-contract = 'StakeManagerTestable'
optimizer = true
optimizer_runs = 200
via_ir = true
cache_path = 'forge-cache'
verbosity = 2
memory_limit = 40003554432
gas_limit = "18446744073709551615"
ignored_warnings_from = ["scripts/helpers/interfaces"]
ffi = true
remappings = [
  "eth-gas-reporter/=node_modules/eth-gas-reporter/",
  "forge-std/=lib/forge-std/src/",
  "hardhat/=node_modules/hardhat/",
]
fs_permissions = [
  { access = "read", path = "./scripts/" },
  { access = "read", path = "./script/" },
  { access = "read", path = "./test/" },
  { access = "read", path = "./out/" },
]
auto_detect_solc = true


[invariant]
fail_on_revert = false
call_override = false
dictionary_weight = 80
include_storage = true
include_push_bytes = true

[profile.intense.fuzz]
runs = 10000
max_test_rejects = 999999

[lint]
lint_on_build = false

[fmt]
line_length = 120
number_underscore = "thousands"
multiline_func_header = "params_first_multi"
wrap_comments = true
single_line_statement_blocks = "preserve"
ignore = [
  "contracts/staking/StakingInfo.sol",
  "contracts/common/mixin/ChainIdMixin.sol",
]

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
mainnet = "https://mainnet.infura.io/v3/${INFURA_TOKEN}"
# mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
sepolia = "https://sepolia.infura.io/v3/${INFURA_TOKEN}"
gilt_pos = "${GILT_POS_RPC_URL}"
gilt_testnet = "${GILT_TESTNET_RPC_URL}"
gilt_zkevm = "${GILT_ZKEVM_RPC_URL}"
gilt_zkevm_testnet = "${GILT_ZKEVM_TESTNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
gilt_pos = { key = "${GILTSCAN_API_KEY}" }
gilt_testnet = { key = "${GILTSCAN_API_KEY}" }
gilt_zkevm = { key = "${GILTSCAN_ZKEVM_API_KEY}" }
gilt_zkevm_testnet = { key = "${GILTSCAN_ZKEVM_API_KEY}" }

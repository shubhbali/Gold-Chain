name: packager_deb

on:
  push:
    paths:
      - '**'
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  build:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Variables
      - name: Adding TAG to ENV
        run: echo "GIT_TAG=`echo $(git describe --tags --abbrev=0)`" >> $GITHUB_ENV
      - name: adding version
        run: |
          NUMERIC_VERSION=$( echo ${{ env.GIT_TAG }} | sed 's/[^0-9.]//g' ) 
          echo "VERSION=$NUMERIC_VERSION" >> $GITHUB_ENV

      - name: Cleaning repo
        run: make clean
      - name: Building for amd64
        run: make gilt

      - name: Making directory structure
        run: mkdir -p packaging/deb/gilt/usr/bin
      - name: Copying necessary files
        run: cp -rp build/bin/gilt packaging/deb/gilt/usr/bin/
      - name: Delete control file
        run: rm -rf packaging/deb/gilt/DEBIAN/control

      # Control file creation
      - name: create control file
        run: |
          touch packaging/deb/gilt/DEBIAN/control
          echo "Package: gilt" >> packaging/deb/gilt/DEBIAN/control
          echo "Version: ${{ env.VERSION }}" >> packaging/deb/gilt/DEBIAN/control
          echo "Section: base" >> packaging/deb/gilt/DEBIAN/control
          echo "Priority: optional" >> packaging/deb/gilt/DEBIAN/control
          echo "Architecture: amd64" >> packaging/deb/gilt/DEBIAN/control
          echo "Maintainer: devops@gilt.technology" >> packaging/deb/gilt/DEBIAN/control
          echo "Description: gilt binary package" >> packaging/deb/gilt/DEBIAN/control

      - name: Creating package for binary for gilt ${{ env.ARCH }}
        run: cp -rp packaging/deb/gilt packaging/deb/gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}
        env:
          ARCH: amd64

      - name: Running package build
        run: dpkg-deb --build --root-owner-group packaging/deb/gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}
        env:
          ARCH: amd64

      - name: Cleaning build directory for arm64 build
        run: make clean

      - name: Updating the apt-get
        run: sudo apt-get update -y

      - name: Adding requirements for cross compile
        run: sudo apt-get install g++-aarch64-linux-gnu gcc-aarch64-linux-gnu

      - name: delete amd64 control file
        run: rm -rf packaging/deb/gilt/DEBIAN/control

      - name: Building gilt for arm64
        run: GOARCH=arm64 GOOS=linux CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ CGO_ENABLED=1 go build -o build/bin/gilt -pgo=prod.pprof ./cmd/cli/main.go

      - name: Copying necessary binary post arm64 build
        run: cp -rp build/bin/gilt packaging/deb/gilt/usr/bin/

      # Control file for arm64 creation
      - name: create control file
        run: |
          touch packaging/deb/gilt/DEBIAN/control
          echo "Package: gilt" >> packaging/deb/gilt/DEBIAN/control
          echo "Version: ${{ env.VERSION }}" >> packaging/deb/gilt/DEBIAN/control
          echo "Section: base" >> packaging/deb/gilt/DEBIAN/control
          echo "Priority: optional" >> packaging/deb/gilt/DEBIAN/control
          echo "Architecture: arm64" >> packaging/deb/gilt/DEBIAN/control
          echo "Maintainer: devops@gilt.technology" >> packaging/deb/gilt/DEBIAN/control
          echo "Description: gilt binary package" >> packaging/deb/gilt/DEBIAN/control

      - name: Creating package for binary for gilt ${{ env.ARCH }}
        run: cp -rp packaging/deb/gilt packaging/deb/gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}
        env:
          ARCH: arm64

      - name: Running package build
        run: dpkg-deb --build --root-owner-group packaging/deb/gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}
        env:
          ARCH: arm64

      # Shasum
      - name: shasum the gilt debian package
        run: cd packaging/deb/ && sha256sum gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}.deb > gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}.deb.checksum
        env:
          ARCH: amd64

      - name: shasum the gilt debian package
        run: cd packaging/deb/ && sha256sum gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}.deb > gilt-${{ env.GIT_TAG }}-${{ env.ARCH }}.deb.checksum
        env:
          ARCH: arm64

      - name: Release gilt Packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GIT_TAG }}
          make_latest: false
          files: |
            packaging/deb/gilt**.deb
            packaging/deb/gilt**.deb.checksum

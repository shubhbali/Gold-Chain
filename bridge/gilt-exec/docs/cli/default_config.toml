chain = ""
identity = ""
verbosity = 3
vmdebug = false
vmtrace = ""
"vmtrace.jsonconfig" = ""
"state.size-tracking" = false
datadir = "/var/lib/gilt-exec"
ancient = ""
"db.engine" = "pebble"
keystore = ""
"rpc.batch-request-limit" = 1000
"rpc.batch-response-max-size" = 25000000
"rpc.returndatalimit" = 100000
syncmode = "full"
gcmode = "full"
"state.scheme" = "path"
snapshot = true
"gilt.logs" = false
ethstats = ""
disable-blind-fork-validation = false
max-blind-fork-validation-limit = 256

["eth.requiredblocks"]

[log]
  vmodule = ""
  json = false
  backtrace = ""
  debug = false
  enable-block-tracking = false

[p2p]
  maxpeers = 50
  maxpendpeers = 50
  bind = "0.0.0.0"
  port = 30303
  nodiscover = false
  nat = "any"
  netrestrict = ""
  nodekey = ""
  nodekeyhex = ""
  txarrivalwait = "500ms"
  txannouncementonly = false
  disable-tx-propagation = false
  [p2p.discovery]
    v4disc = true
    v5disc = true
    bootnodes = []
    bootnodesv4 = []
    bootnodesv5 = []
    static-nodes = []
    trusted-nodes = []
    dns = []

[giltconsensus]
  url = "http://localhost:1317"
  timeout = "5s"
  grpc-address = ""
  ws-address = ""

[txpool]
  locals = []
  nolocals = false
  journal = "transactions.rlp"
  rejournal = "1h0m0s"
  pricelimit = 25000000000
  pricebump = 10
  accountslots = 16
  globalslots = 131072
  accountqueue = 64
  globalqueue = 131072
  lifetime = "3h0m0s"
  filtered-addresses = ""
  rebroadcast = true
  rebroadcast-interval = "30s"
  rebroadcast-max-age = "10m0s"
  rebroadcast-batch-size = 200

[miner]
  mine = false
  allow-gas-tip-override = false
  etherbase = ""
  extradata = ""
  gaslimit = 45000000
  enableDynamicGasLimit = false
  gasLimitMin = 50000000
  gasLimitMax = 65000000
  targetBaseFee = 500000000000
  baseFeeBuffer = 300000000000
  enableDynamicTargetGas = false
  targetGasMinPercentage = 50
  targetGasMaxPercentage = 80
  gasprice = "25000000000"
  recommit = "2m5s"
  commitinterrupt = true
  blocktime = "0s"
  target-gas-percentage = 0
  base-fee-change-denominator = 0
  prefetch = false
  prefetch-gaslimit-percent = 100

[jsonrpc]
  ipcdisable = false
  ipcpath = ""
  gascap = 50000000
  evmtimeout = "5s"
  txfeecap = 1.0
  logquerylimit = 1000
  rangelimit = 0
  allow-unprotected-txs = false
  enabledeprecatedpersonal = false
  "txsync.defaulttimeout" = "20s"
  "txsync.maxtimeout" = "1m0s"
  accept-preconf-tx = false
  accept-private-tx = false
  [jsonrpc.http]
    enabled = false
    port = 8545
    prefix = ""
    host = "localhost"
    api = ["eth", "net", "web3", "txpool", "gilt"]
    vhosts = ["localhost"]
    corsdomain = ["localhost"]
    ep-size = 40
    ep-requesttimeout = "0s"
  [jsonrpc.ws]
    enabled = false
    port = 8546
    prefix = ""
    host = "localhost"
    api = ["net", "web3"]
    origins = ["localhost"]
    ep-size = 40
    ep-requesttimeout = "0s"
  [jsonrpc.graphql]
    enabled = false
    port = 0
    prefix = ""
    host = ""
    vhosts = ["localhost"]
    corsdomain = ["localhost"]
    ep-size = 0
    ep-requesttimeout = ""
  [jsonrpc.auth]
    jwtsecret = ""
    addr = "localhost"
    port = 8551
    vhosts = ["localhost"]
  [jsonrpc.timeouts]
    read = "10s"
    readheader = "30s"
    write = "30s"
    idle = "2m0s"

[gpo]
  blocks = 20
  percentile = 60
  maxheaderhistory = 1024
  maxblockhistory = 1024
  maxprice = "500000000000"
  ignoreprice = "25000000000"

[telemetry]

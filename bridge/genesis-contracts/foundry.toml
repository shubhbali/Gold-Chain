[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 999999
via_ir = true
verbosity = 2
ffi = true
fs_permissions = [{ access = "read", path = "./out/"}]

remappings = [
  "forge-std=lib/forge-std/src",
  "openzeppelin-solidity/=node_modules/openzeppelin-solidity/",
]

[profile.intense.fuzz]
runs = 10000
max_test_rejects = 999999

[fmt]
line_length = 160
number_underscore = "thousands"

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
mainnet = "https://mainnet.infura.io/v3/${INFURA_KEY}"
goerli = "https://goerli.infura.io/v3/${INFURA_KEY}"
sepolia = "https://sepolia.infura.io/v3/${INFURA_KEY}"
gilt_pos = "${GILT_POS_RPC_URL}"
gilt_testnet = "${GILT_TESTNET_RPC_URL}"
gilt_zkevm = "${GILT_ZKEVM_RPC_URL}"
gilt_zkevm_testnet = "${GILT_ZKEVM_TESTNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
goerli = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
gilt_pos = { key = "${GILTSCAN_API_KEY}" }
gilt_testnet = { key = "${GILTSCAN_API_KEY}" }
gilt_zkevm = { key = "${GILTSCAN_ZKEVM_API_KEY}" }
gilt_zkevm_testnet = { key = "${GILTSCAN_ZKEVM_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

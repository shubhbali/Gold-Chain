syntax = "proto3";
package giltconsensusv2.gilt;

import "gogoproto/gogo.proto";
import "giltconsensusv2/gilt/gilt.proto";
import "amino/amino.proto";

option go_package = "github.com/giltchain/gilt-consensus/x/gilt/types";

// GenesisState defines the gilt module's genesis state.
message GenesisState {
  // Module parameters at genesis.
  Params params = 1
      [ (amino.dont_omitempty) = true, (gogoproto.nullable) = false ];
  // Initial spans loaded at genesis.
  // This allows the chain to start with pre-configured spans.
  repeated Span spans = 2
      [ (amino.dont_omitempty) = true, (gogoproto.nullable) = false ];
}

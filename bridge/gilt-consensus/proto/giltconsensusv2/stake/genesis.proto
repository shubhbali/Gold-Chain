syntax = "proto3";
package giltconsensusv2.stake;

option go_package = "github.com/giltchain/gilt-consensus/x/stake/types";

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "giltconsensusv2/stake/last_block_txs.proto";
import "giltconsensusv2/stake/validator.proto";

// GenesisState defines the stake module's genesis state.
message GenesisState {
  // All validators at genesis.
  repeated Validator validators = 1
      [ (gogoproto.nullable) = true, (amino.dont_omitempty) = true ];
  // Current active validator set.
  ValidatorSet current_validator_set = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // Staking transaction sequences for replay protection.
  repeated string staking_sequences = 3 [ (amino.dont_omitempty) = true ];
  // Validator set from the previous block.
  ValidatorSet previous_block_validator_set = 4
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // Stake transactions from the last block.
  LastBlockTxs last_block_txs = 5
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // Validator set from two blocks ago.
  ValidatorSet penultimate_block_validator_set = 6
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // GOLD delegations escrowed in the stake module.
  repeated GoldDelegation gold_delegations = 7
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // Native validator candidate approvals.
  repeated ValidatorApproval validator_approvals = 8
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  // Native validator lifecycle safety params.
  ValidatorLifecycleParams validator_lifecycle_params = 9
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

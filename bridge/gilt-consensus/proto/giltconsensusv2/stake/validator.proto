syntax = "proto3";
package giltconsensusv2.stake;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/giltchain/gilt-consensus/x/stake/types";

// Validator represents a single validator in the GiltConsensus network.
// Validators are responsible for producing blocks on the Gilt chain and
// securing the network through Proof-of-Stake consensus.
message Validator {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_getters) = true;
  // Unique identifier for this validator.
  uint64 val_id = 1 [ (amino.dont_omitempty) = true ];
  // Epoch when this validator becomes active.
  uint64 start_epoch = 2 [ (amino.dont_omitempty) = true ];
  // Epoch when this validator becomes inactive. 0 means no end epoch set.
  uint64 end_epoch = 3 [ (amino.dont_omitempty) = true ];
  // Nonce for replay protection of validator transactions.
  uint64 nonce = 4 [ (amino.dont_omitempty) = true ];
  // Voting power based on the validator's stake amount.
  int64 voting_power = 5 [ (amino.dont_omitempty) = true ];
  // Public key used for block signing on the Gilt chain.
  bytes pub_key = 6 [ (amino.dont_omitempty) = true ];
  // GiltConsensus address of this validator's signer.
  string signer = 7 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (amino.dont_omitempty) = true
  ];
  // Gold Chain operator account that controls native validator lifecycle
  // transactions.
  string operator = 18 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (amino.dont_omitempty) = true
  ];
  // Block height or identifier when this validator was last updated.
  string last_updated = 8 [ (amino.dont_omitempty) = true ];
  // Whether this validator is currently jailed (slashed and temporarily
  // removed).
  bool jailed = 9 [ (amino.dont_omitempty) = true ];
  // Priority value used for round-robin proposer selection in Tendermint.
  int64 proposer_priority = 10 [ (amino.dont_omitempty) = true ];
  // Validator self-bonded GILT stake in raw token base units.
  string self_gilt_stake = 11 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  // Delegated GILT stake in raw token base units.
  string delegated_gilt_stake = 12 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  // Delegated GOLD stake in raw token base units.
  string delegated_gold_stake = 13 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  // Effective reward weight after GILT/GOLD value conversion and GOLD
  // weighting.
  string effective_reward_weight = 14 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  // GOLD reward weight applied to delegated GOLD value in basis points.
  uint64 gold_reward_weight_bps = 15 [ (amino.dont_omitempty) = true ];
  // Last accepted price used for reward-weight calculation, scaled by 1e18.
  string last_gilt_price_in_gold = 16 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  // Price snapshot epoch used for the current reward weight.
  uint64 reward_weight_epoch = 17 [ (amino.dont_omitempty) = true ];
}

// ValidatorApproval records approval for a validator candidate before the
// candidate can join Gold Chain.
message ValidatorApproval {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_getters) = true;

  uint64 val_id = 1 [ (amino.dont_omitempty) = true ];
  string operator = 2 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (amino.dont_omitempty) = true
  ];
  uint64 activation_epoch = 3 [ (amino.dont_omitempty) = true ];
  string max_gilt_stake = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
  bytes signer_pub_key = 5 [ (amino.dont_omitempty) = true ];
  uint64 nonce = 6 [ (amino.dont_omitempty) = true ];
}

// ValidatorLifecycleParams defines native validator safety limits.
message ValidatorLifecycleParams {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_getters) = true;

  string approval_authority = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (amino.dont_omitempty) = true
  ];
  uint64 min_active_validators = 2 [ (amino.dont_omitempty) = true ];
  uint64 max_validator_power_bps = 3 [ (amino.dont_omitempty) = true ];
  uint64 validator_unbonding_epochs = 4 [ (amino.dont_omitempty) = true ];
}

// GoldDelegation records GOLD escrowed by a delegator for validator rewards.
message GoldDelegation {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_getters) = true;

  // Delegator account that owns the escrowed GOLD.
  string delegator = 1 [
    (cosmos_proto.scalar) = "cosmos.AddressString",
    (amino.dont_omitempty) = true
  ];
  // Validator receiving this delegated GOLD reward weight.
  uint64 val_id = 2 [ (amino.dont_omitempty) = true ];
  // Escrowed GOLD amount in raw token base units.
  string amount = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (amino.dont_omitempty) = true
  ];
}

// ValidatorSet represents a complete set of validators at a specific point in
// time. This is used for consensus and includes the designated block proposer.
message ValidatorSet {
  option (gogoproto.equal) = true;
  option (gogoproto.goproto_getters) = false;
  // List of all validators in this set.
  repeated Validator validators = 1
      [ (gogoproto.nullable) = true, (amino.dont_omitempty) = true ];
  // The validator designated as proposer for the current block.
  Validator proposer = 2
      [ (gogoproto.nullable) = true, (amino.dont_omitempty) = true ];
  // Sum of voting power across all validators in this set.
  int64 total_voting_power = 3 [ (amino.dont_omitempty) = true ];
}

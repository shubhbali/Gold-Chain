syntax = "proto3";
package giltconsensusv2.chainmanager;

import "gogoproto/gogo.proto";
import "amino/amino.proto";

option go_package = "github.com/giltchain/gilt-consensus/x/chainmanager/types";

// ChainParams contains configuration for both chains and contract addresses.
message ChainParams {
  option (gogoproto.equal) = true;
  // Chain ID of the Gilt (child) chain.
  string gilt_chain_id = 1 [ (amino.dont_omitempty) = true ];
  // Chain ID of the GiltConsensus chain.
  string giltconsensus_chain_id = 2 [
    (amino.dont_omitempty) = true,
    (gogoproto.customname) = "GiltConsensusChainId"
  ];
  reserved 3, 4;
  // Address of the slash manager contract on the root chain.
  string slash_manager_address = 5 [ (amino.dont_omitempty) = true ];
  // Address of the root chain contract (checkpoint submission).
  string root_chain_address = 6 [ (amino.dont_omitempty) = true ];
  // Address of the staking info contract on the root chain.
  string staking_info_address = 7 [ (amino.dont_omitempty) = true ];
  // Address of the state sender contract on the root chain.
  string state_sender_address = 8 [ (amino.dont_omitempty) = true ];
  // Address of the state receiver contract on the Gilt chain.
  string state_receiver_address = 9 [ (amino.dont_omitempty) = true ];
  // Address of the validator set contract on the root chain.
  string validator_set_address = 10 [ (amino.dont_omitempty) = true ];
}

// Params defines the parameters for the chainmanager module.
message Params {
  option (gogoproto.equal) = true;
  // Chain configuration and contract addresses.
  ChainParams chain_params = 1
      [ (amino.dont_omitempty) = true, (gogoproto.nullable) = false ];
  // Number of confirmations required for main chain transactions.
  uint64 main_chain_tx_confirmations = 2 [ (amino.dont_omitempty) = true ];
  // Number of confirmations required for Gilt chain transactions.
  uint64 gilt_chain_tx_confirmations = 3 [ (amino.dont_omitempty) = true ];
}

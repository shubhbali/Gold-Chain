syntax = "proto3";
package giltconsensusv2.pricefeed;

import "amino/amino.proto";
import "giltconsensusv2/pricefeed/pricefeed.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/giltchain/gilt-consensus/x/pricefeed/types";

// GenesisState defines the pricefeed module's genesis state.
message GenesisState {
  Params params = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  repeated PriceSnapshot price_snapshots = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  uint64 latest_epoch = 3 [ (amino.dont_omitempty) = true ];
}

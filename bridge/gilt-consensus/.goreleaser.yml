project_name: giltconsensus-v2

release:
  disable: true
  draft: true
  prerelease: auto

builds:
  - &xbuildd
    id: giltconsensusd-darwin-amd64
    main: ./cmd/giltconsensusd
    binary: giltconsensusd
    goos:
      - darwin
    goarch:
      - amd64
    tags:
      - netgo
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags: &ldflags
      - -s -w
      - -X github.com/0xGilt/giltconsensus-v2/version.Name=giltconsensus
      - -X github.com/0xGilt/giltconsensus-v2/version.ServerName=giltconsensusd
      - -X github.com/0xGilt/giltconsensus-v2/version.Version={{.Version}}
      - -X github.com/0xGilt/giltconsensus-v2/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.Name=giltconsensus
      - -X github.com/cosmos/cosmos-sdk/version.ServerName=giltconsensusd
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}

  - <<: *xbuildd
    id: giltconsensusd-darwin-arm64
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++

  - <<: *xbuildd
    id: giltconsensusd-linux-amd64
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CC=gcc
      - CXX=g++
    ldflags:
      # We need to build a static binary because we are building in a glibc-based system and running in a musl container
      - -s -w -extldflags "-static"
      - -X github.com/0xGilt/giltconsensus-v2/version.Name=giltconsensus
      - -X github.com/0xGilt/giltconsensus-v2/version.ServerName=giltconsensusd
      - -X github.com/0xGilt/giltconsensus-v2/version.Version={{.Version}}
      - -X github.com/0xGilt/giltconsensus-v2/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.Name=giltconsensus
      - -X github.com/cosmos/cosmos-sdk/version.ServerName=giltconsensusd
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}

  - <<: *xbuildd
    id: giltconsensusd-linux-arm64
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      # We need to build a static binary because we are building in a glibc-based system and running in a musl container
      - -s -w -extldflags "-static"
      - -X github.com/0xGilt/giltconsensus-v2/version.Name=giltconsensus
      - -X github.com/0xGilt/giltconsensus-v2/version.ServerName=giltconsensusd
      - -X github.com/0xGilt/giltconsensus-v2/version.Version={{.Version}}
      - -X github.com/0xGilt/giltconsensus-v2/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.Name=giltconsensus
      - -X github.com/cosmos/cosmos-sdk/version.ServerName=giltconsensusd
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}

nfpms:
  - vendor: 0xGilt
    homepage: https://gilt.technology
    maintainer: Gilt Team <team@gilt.technology>
    description: Gilt Blockchain
    license: GPLv3 LGPLv3

    bindir: /usr/local/bin

    formats:
      - apk
      - deb
      - rpm

    contents:
      - src: builder/files/giltconsensusd.service
        dst: /lib/systemd/system/giltconsensusd.service
        type: config
      - src: builder/files/genesis-mainnet-v1.json
        dst: /etc/giltconsensus/genesis-mainnet-v1.json
        type: config
      - src: builder/files/genesis-testnet-v4.json
        dst: /etc/giltconsensus/genesis-testnet-v4.json
        type: config
      - src: builder/files/genesis-gilttestnet-v1.json
        dst: /etc/giltconsensus/genesis-gilttestnet-v1.json
        type: config
      - dst: /var/lib/giltconsensus
        type: dir
        file_info:
          mode: 0777

    scripts:
      postinstall: builder/files/giltconsensus-post-install.sh

snapshot:
  version_template: "{{ .Tag }}.next"

dockers:
  - image_templates:
      - 0xgilt/{{ .ProjectName }}:{{ .Version }}-amd64
    dockerfile: Dockerfile.release
    use: buildx
    goarch: amd64
    ids:
      - giltconsensusd-linux-amd64
    build_flag_templates:
      - --platform=linux/amd64
    extra_files:
      - docker/entrypoint.sh
      - builder/files/genesis-mainnet-v1.json
      - builder/files/genesis-testnet-v4.json
      - builder/files/genesis-gilttestnet-v1.json

  - image_templates:
      - 0xgilt/{{ .ProjectName }}:{{ .Version }}-arm64
    dockerfile: Dockerfile.release
    use: buildx
    goarch: arm64
    ids:
      - giltconsensusd-linux-arm64
    build_flag_templates:
      - --platform=linux/arm64/v8
    extra_files:
      - docker/entrypoint.sh
      - builder/files/genesis-mainnet-v1.json
      - builder/files/genesis-testnet-v4.json
      - builder/files/genesis-gilttestnet-v1.json

docker_manifests:
  - name_template: 0xgilt/{{ .ProjectName }}:{{ .Version }}
    image_templates:
      - 0xgilt/{{ .ProjectName }}:{{ .Version }}-amd64
      - 0xgilt/{{ .ProjectName }}:{{ .Version }}-arm64

  - name_template: 0xgilt/{{ .ProjectName }}:latest
    image_templates:
    - 0xgilt/{{ .ProjectName }}:{{ .Version }}-amd64
    - 0xgilt/{{ .ProjectName }}:{{ .Version }}-arm64

announce:
  slack:
    enabled: true
    # The name of the channel that the user selected as a destination for webhook messages.
    channel: '#code-releases'
